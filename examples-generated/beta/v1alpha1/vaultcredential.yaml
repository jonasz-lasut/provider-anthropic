---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: VaultCredential
metadata:
  name: example-vaultcredential
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/vaultcredential
spec:
  forProvider:
    displayName: example-vaultcredential
    anthropicDeletionPolicy: Delete
    metadata:
      example: "true"
    auth:
      type: static_bearer
      mcpServerUrl: https://mcp.example.com
      token: REPLACE_WITH_MCP_BEARER_TOKEN
    vaultIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Vault
metadata:
  name: example-vault
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/vaultcredential
spec:
  forProvider:
    displayName: example-vault
    anthropicDeletionPolicy: Delete
    metadata:
      example: "true"
