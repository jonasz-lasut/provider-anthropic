---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: MemoryStoreMemory
metadata:
  name: example-memorystorememory
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/memorystorememory
spec:
  forProvider:
    path: /projects/example/notes.md
    content: |
      Example memory content for E2E testing.
    memoryStoreIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: MemoryStore
metadata:
  name: example-memorystore
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/memorystorememory
spec:
  forProvider:
    name: example-memorystore
    description: Example memory store for E2E testing.
    anthropicDeletionPolicy: Delete
    metadata:
      example: "true"
