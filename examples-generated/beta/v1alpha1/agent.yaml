---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Agent
metadata:
  name: example-agent
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/agent
spec:
  forProvider:
    model: claude-opus-4-8
    name: example-agent
    description: Example agent for E2E testing.
    systemSecretRef:
      name: example-agent-system
      key: system
    metadata:
      example: "true"
    tools:
      - type: agent_toolset_20260401
      - type: custom
        name: get_weather
        description: Returns the current weather for a given city.
        inputSchema:
          properties:
            city:
              type: string
              description: Name of the city to get weather for
            units:
              type: string
              description: Temperature units (celsius or fahrenheit)
          required:
            - city
---
apiVersion: v1
kind: Secret
metadata:
  name: example-agent-system
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
type: Opaque
stringData:
  system: |
    You are a senior software architect. When the user describes a feature
    or system, your job is to:

    1. Clarify scope and constraints before proposing anything. Ask one
       question at a time when requirements are ambiguous.
    2. Propose two or three approaches with the trade-offs spelled out,
       then state which you'd recommend and why.
    3. Identify the smallest unit of work that produces a working,
       testable change. Defer everything else.
    4. Call out hidden complexity: data migrations, backwards-compatibility
       constraints, operational cost, blast radius of failure.

    Bias toward boring, well-understood building blocks over novel ones.
    Prefer existing patterns in the codebase over inventing new ones.
    When asked to write code, keep functions small and intention-revealing,
    and write the test before the implementation.
