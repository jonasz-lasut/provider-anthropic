---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Deployment
metadata:
  name: example-deployment
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/deployment
spec:
  forProvider:
    name: example-deployment
    description: Example deployment for E2E testing.
    metadata:
      example: "true"
    paused: false
    schedule:
      expression: 0 9 * * 1-5
      timezone: UTC
    agentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    environmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    vaultIdsSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    # A system.message must be the final event and immediately follow a user.message,
    # and requires a model that accepts mid-conversation system messages (opus 4-8 does).
    initialEvents:
      - type: user.define_outcome
        description: Produce a concise summary of repository changes.
        maxIterations: 3
        rubric:
          type: text
          content: The summary is accurate, concise, and lists the key changes.
      - type: user.message
        content:
          - type: text
            text: Summarize the latest changes in the repository.
      - type: system.message
        content:
          - type: text
            text: You are an example agent for E2E testing.
---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Agent
metadata:
  name: example-agent
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/deployment
spec:
  forProvider:
    model: claude-opus-4-8
    name: example-agent
    description: Example agent for E2E testing.
    metadata:
      example: "true"
    tools:
      - type: agent_toolset_20260401
---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Environment
metadata:
  name: example-environment
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/deployment
spec:
  forProvider:
    name: example-environment
    description: Example environment for E2E testing.
    metadata:
      example: "true"
    config:
      networking:
        type: unrestricted
      packages:
        pip:
          - requests
---
apiVersion: beta.anthropic.crossplane.io/v1alpha1
kind: Vault
metadata:
  name: example-vault
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: beta/v1alpha1/deployment
spec:
  forProvider:
    displayName: example-vault
    anthropicDeletionPolicy: Delete
    metadata:
      example: "true"
