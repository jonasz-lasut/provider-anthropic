---
apiVersion: managedagents.anthropic.crossplane.io/v1beta1
kind: MemoryStoreMemory
metadata:
  name: example-memorystorememory
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: managedagents/v1beta1/memorystorememory
spec:
  forProvider:
    path: /projects/example/notes.md
    contentSecretRef:
      name: example-memorystorememory-content
      key: content
    memoryStoreIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: v1
kind: Secret
metadata:
  name: example-memorystorememory-content
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
type: Opaque
stringData:
  content: |
    Example memory content for E2E testing.
---
apiVersion: managedagents.anthropic.crossplane.io/v1beta1
kind: MemoryStore
metadata:
  name: example-memorystore
  namespace: crossplane-system
  labels:
    testing.upbound.io/example-name: example
  annotations:
    meta.upbound.io/example-id: managedagents/v1beta1/memorystorememory
spec:
  forProvider:
    name: example-memorystore
    description: Example memory store for E2E testing.
    anthropicDeletionPolicy: Delete
    metadata:
      example: "true"
