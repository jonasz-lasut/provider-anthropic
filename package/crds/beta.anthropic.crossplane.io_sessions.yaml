            status:
              description: SessionStatus defines the observed state of Session.
              properties:
                atProvider:
                  description: AtProvider holds the observed state as returned by the Anthropic API.
                  properties:
                    agentId:
                      description: AgentID is the ID of the agent snapshot bound to this session.
                      type: string
                    archivedAt:
                      description: ArchivedAt is set when the session has been archived.
                      type: string
                    createdAt:
                      description: CreatedAt is the RFC 3339 timestamp when the session was created.
                      type: string
                    deploymentId:
                      description: |-
                        DeploymentID is the deployment ID when the session was created from a
                        deployment reference. Empty otherwise.
                      type: string
                    environmentId:
                      description: EnvironmentID is the observed environment ID returned by the API.
                      type: string
                    id:
                      description: |-
                        ID is the Anthropic-assigned session identifier. Also stored in the
                        external-name annotation, which the reconciler uses as the primary key.
                      type: string
                    metadata:
                      additionalProperties:
                        type: string
                      description: Metadata is the observed key-value metadata map.
                      type: object
                    status:
                      description: Status is the current session status.
                      type: string
                    title:
                      description: Title is the observed human-readable session title.
                      type: string
                    updatedAt:
                      description: UpdatedAt is the RFC 3339 timestamp of the last modification.
                      type: string
                    vaultIds:
                      description: VaultIDs is the observed list of vault IDs attached at creation.
                      items:
                        type: string
                      type: array
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          LastTransitionTime is the last time this condition transitioned from one
