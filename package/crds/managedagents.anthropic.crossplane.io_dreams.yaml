---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    anthropic.crossplane.io/sdk-version: v1.57.0
  name: dreams.managedagents.anthropic.crossplane.io
spec:
  group: managedagents.anthropic.crossplane.io
  names:
    categories:
      - crossplane
      - managed
      - anthropic
    kind: Dream
    listKind: DreamList
    plural: dreams
    shortNames:
      - dream
    singular: dream
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type=='Ready')].status
          name: READY
          type: string
        - jsonPath: .status.conditions[?(@.type=='Synced')].status
          name: SYNCED
          type: string
        - jsonPath: .status.atProvider.status
          name: STATUS
          type: string
        - jsonPath: .metadata.annotations.crossplane\.io/external-name
          name: EXTERNAL-NAME
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
      name: v1beta1
      schema:
        openAPIV3Schema:
          description: |-
            Dream is a managed resource representing an Anthropic Dream — an asynchronous
            memory-consolidation job (research-preview beta API). A Dream is immutable
            after creation.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: DreamSpec defines the desired state of Dream.
              properties:
                forProvider:
                  description: |-
                    ForProvider holds the configuration the provider reconciles against the
                    Anthropic API on every loop.
                  properties:
                    inputs:
                      description: |-
                        Required: Inputs are the sources the dream reads from — typically one
                        memory store plus a set of session transcripts. Immutable after creation.
                      items:
                        description: |-
                          DreamInput is one source the dream reads from. The Type field selects the
                          variant; supply only the fields relevant to that variant. A "memory_store"
                          input reads an existing MemoryStore (never mutated); a "sessions" input reads
                          a set of session transcripts.
                        properties:
                          memoryStoreId:
                            description: |-
                              MemoryStoreID is the ID of the memory store to read from (memory_store
                              type). Populate directly or via MemoryStoreIDRef / MemoryStoreIDSelector.
                            type: string
                          memoryStoreIdRef:
                            description: Reference to a MemoryStore to populate memoryStoreId.
                            properties:
                              name:
                                description: Name of the referenced object.
                                type: string
                              namespace:
                                description: Namespace of the referenced object
                                type: string
                              policy:
                                description: Policies for referencing.
                                properties:
                                  resolution:
                                    default: Required
                                    description: |-
                                      Resolution specifies whether resolution of this reference is required.
                                      The default is 'Required', which means the reconcile will fail if the
                                      reference cannot be resolved. 'Optional' means this reference will be
                                      a no-op if it cannot be resolved.
                                    enum:
                                      - Required
                                      - Optional
                                    type: string
                                  resolve:
                                    description: |-
                                      Resolve specifies when this reference should be resolved. The default
                                      is 'IfNotPresent', which will attempt to resolve the reference only when
                                      the corresponding field is not present. Use 'Always' to resolve the
                                      reference on every reconcile.
                                    enum:
                                      - Always
                                      - IfNotPresent
                                    type: string
                                type: object
                            required:
                              - name
                            type: object
                          memoryStoreIdSelector:
                            description: Selector for a MemoryStore to populate memoryStoreId.
                            properties:
                              matchControllerRef:
                                description: |-
                                  MatchControllerRef ensures an object with the same controller reference
                                  as the selecting object is selected.
                                type: boolean
                              matchLabels:
                                additionalProperties:
                                  type: string
                                description: MatchLabels ensures an object with matching labels is selected.
                                type: object
                              namespace:
                                description: Namespace for the selector
                                type: string
                              policy:
                                description: Policies for selection.
                                properties:
                                  resolution:
                                    default: Required
                                    description: |-
                                      Resolution specifies whether resolution of this reference is required.
                                      The default is 'Required', which means the reconcile will fail if the
                                      reference cannot be resolved. 'Optional' means this reference will be
                                      a no-op if it cannot be resolved.
                                    enum:
                                      - Required
                                      - Optional
                                    type: string
                                  resolve:
                                    description: |-
                                      Resolve specifies when this reference should be resolved. The default
                                      is 'IfNotPresent', which will attempt to resolve the reference only when
                                      the corresponding field is not present. Use 'Always' to resolve the
                                      reference on every reconcile.
                                    enum:
                                      - Always
                                      - IfNotPresent
                                    type: string
                                type: object
                            type: object
                          sessionIds:
                            description: |-
                              SessionIDs lists the session transcript IDs to read from (sessions type).
                              Populate directly or via SessionIDsRefs / SessionIDsSelector.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: set
                          sessionIdsRefs:
                            description: References to Sessions used to populate sessionIds.
                            items:
                              description: A NamespacedReference to a named object.
                              properties:
                                name:
                                  description: Name of the referenced object.
                                  type: string
                                namespace:
                                  description: Namespace of the referenced object
                                  type: string
                                policy:
                                  description: Policies for referencing.
                                  properties:
                                    resolution:
                                      default: Required
                                      description: |-
                                        Resolution specifies whether resolution of this reference is required.
                                        The default is 'Required', which means the reconcile will fail if the
                                        reference cannot be resolved. 'Optional' means this reference will be
                                        a no-op if it cannot be resolved.
                                      enum:
                                        - Required
                                        - Optional
                                      type: string
                                    resolve:
                                      description: |-
                                        Resolve specifies when this reference should be resolved. The default
                                        is 'IfNotPresent', which will attempt to resolve the reference only when
                                        the corresponding field is not present. Use 'Always' to resolve the
                                        reference on every reconcile.
                                      enum:
                                        - Always
                                        - IfNotPresent
                                      type: string
                                  type: object
                              required:
                                - name
                              type: object
                            type: array
                          sessionIdsSelector:
                            description: Selector for Sessions used to populate sessionIds.
                            properties:
                              matchControllerRef:
                                description: |-
                                  MatchControllerRef ensures an object with the same controller reference
                                  as the selecting object is selected.
                                type: boolean
                              matchLabels:
                                additionalProperties:
                                  type: string
                                description: MatchLabels ensures an object with matching labels is selected.
                                type: object
                              namespace:
                                description: Namespace for the selector
                                type: string
                              policy:
                                description: Policies for selection.
                                properties:
                                  resolution:
                                    default: Required
                                    description: |-
                                      Resolution specifies whether resolution of this reference is required.
                                      The default is 'Required', which means the reconcile will fail if the
                                      reference cannot be resolved. 'Optional' means this reference will be
                                      a no-op if it cannot be resolved.
                                    enum:
                                      - Required
                                      - Optional
                                    type: string
                                  resolve:
                                    description: |-
                                      Resolve specifies when this reference should be resolved. The default
                                      is 'IfNotPresent', which will attempt to resolve the reference only when
                                      the corresponding field is not present. Use 'Always' to resolve the
                                      reference on every reconcile.
                                    enum:
                                      - Always
                                      - IfNotPresent
                                    type: string
                                type: object
                            type: object
                          type:
                            description: 'Required: Type identifies the input variant.'
                            enum:
                              - memory_store
                              - sessions
                            type: string
                        type: object
                      type: array
                    instructions:
                      description: Instructions guide the consolidation. Immutable after creation.
                      type: string
                    model:
                      description: |-
                        Required: Model identifier and configuration applied to every pipeline
                        stage. Immutable after creation.
                      properties:
                        id:
                          description: |-
                            Required: ID is the model identifier, e.g. "claude-opus-4-7".
                            1–256 characters.
                          maxLength: 256
                          type: string
                        speed:
                          description: |-
                            Speed is the inference speed mode. "fast" provides significantly faster
                            output-token generation at premium pricing and is not supported by every
                            model. Defaults to "standard".
                          enum:
                            - standard
                            - fast
                          type: string
                      type: object
                  type: object
                managementPolicies:
                  default:
                    - '*'
                  description: |-
                    THIS IS A BETA FIELD. It is on by default but can be opted out
                    through a Crossplane feature flag.
                    ManagementPolicies specify the array of actions Crossplane is allowed to
                    take on the managed and external resources.
                    See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                    and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                  items:
                    description: |-
                      A ManagementAction represents an action that the Crossplane controllers
                      can take on an external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - '*'
                    type: string
                  type: array
                providerConfigRef:
                  default:
                    kind: ClusterProviderConfig
                    name: default
                  description: |-
                    ProviderConfigReference specifies how the provider that will be used to
                    create, observe, update, and delete this managed resource should be
                    configured.
                  properties:
                    kind:
                      description: Kind of the referenced object.
                      type: string
                    name:
                      description: Name of the referenced object.
                      type: string
                  required:
                    - kind
                    - name
                  type: object
                writeConnectionSecretToRef:
                  description: |-
                    WriteConnectionSecretToReference specifies the namespace and name of a
                    Secret to which any connection details for this managed resource should
                    be written. Connection details frequently include the endpoint, username,
                    and password required to connect to the managed resource.
                  properties:
                    name:
                      description: Name of the secret.
                      type: string
                  required:
                    - name
                  type: object
              required:
                - forProvider
              type: object
            status:
              description: DreamStatus defines the observed state of Dream.
              properties:
                atProvider:
                  description: AtProvider holds the observed state as returned by the Anthropic API.
                  properties:
                    createdAt:
                      description: CreatedAt is the RFC 3339 timestamp when the dream was created.
                      type: string
                    endedAt:
                      description: EndedAt is the RFC 3339 timestamp when the dream reached a terminal state.
                      type: string
                    error:
                      description: Error is the failure detail, populated when status is "failed".
                      properties:
                        message:
                          description: Message is the human-readable failure message.
                          type: string
                        type:
                          description: Type is the failure type identifier.
                          type: string
                      type: object
                    id:
                      description: |-
                        ID is the Anthropic-assigned identifier. Also stored in the external-name
                        annotation, which the reconciler uses as the primary key.
                      type: string
                    inputs:
                      description: Inputs are the observed input sources.
                      items:
                        description: DreamInputObservation is one observed input source.
                        properties:
                          memoryStoreId:
                            description: MemoryStoreID is the observed memory store ID (memory_store type).
                            type: string
                          sessionIds:
                            description: SessionIDs are the observed session IDs (sessions type).
                            items:
                              type: string
                            type: array
                          type:
                            description: Type identifies the input variant ("memory_store" or "sessions").
                            type: string
                        type: object
                      type: array
                    instructions:
                      description: Instructions is the observed consolidation instruction text.
                      type: string
                    model:
                      description: Model is the observed model configuration.
                      properties:
                        id:
                          description: ID is the model identifier.
                          type: string
                        speed:
                          description: Speed is the observed inference speed mode.
                          type: string
                      type: object
                    outputs:
                      description: Outputs are the memory stores the dream wrote consolidated memories into.
                      items:
                        description: DreamOutputObservation is one output memory store the dream writes into.
                        properties:
                          memoryStoreId:
                            description: |-
                              MemoryStoreID is the ID of the memory store the dream created and wrote
                              consolidated memories into.
                            type: string
                          type:
                            description: Type identifies the output variant ("memory_store").
                            type: string
                        type: object
                      type: array
                    sessionId:
                      description: SessionID is the session the dream is associated with.
                      type: string
                    status:
                      description: |-
                        Status is the dream lifecycle status: "pending", "running", "completed",
                        "failed", or "canceled".
                      type: string
                    usage:
                      description: Usage is the cumulative token usage across the dream.
                      properties:
                        cacheCreationInputTokens:
                          description: |-
                            CacheCreationInputTokens is the number of tokens used to create
                            prompt-cache entries.
                          format: int64
                          type: integer
                        cacheReadInputTokens:
                          description: CacheReadInputTokens is the number of tokens read from the prompt cache.
                          format: int64
                          type: integer
                        inputTokens:
                          description: InputTokens is the number of uncached input tokens consumed.
                          format: int64
                          type: integer
                        outputTokens:
                          description: OutputTokens is the number of output tokens generated.
                          format: int64
                          type: integer
                      type: object
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          LastTransitionTime is the last time this condition transitioned from one
                          status to another.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          A Message containing details about this condition's last transition from
                          one status to another, if any.
                        type: string
                      observedGeneration:
                        description: |-
                          ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        type: integer
                      reason:
                        description: A Reason for this condition's last transition from one status to another.
                        type: string
                      status:
                        description: Status of this condition; is it currently True, False, or Unknown?
                        type: string
                      type:
                        description: |-
                          Type of this condition. At most one of each condition type may apply to
                          a resource at any point in time.
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: |-
                    ObservedGeneration is the latest metadata.generation
                    which resulted in either a ready state, or stalled due to error
                    it can not recover from without human intervention.
                  format: int64
                  type: integer
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
