---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    anthropic.crossplane.io/sdk-version: v1.55.0
  name: vaultcredentials.beta.anthropic.crossplane.io
spec:
  group: beta.anthropic.crossplane.io
  names:
    categories:
      - crossplane
      - managed
      - anthropic
    kind: VaultCredential
    listKind: VaultCredentialList
    plural: vaultcredentials
    shortNames:
      - vaultcred
    singular: vaultcredential
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type=='Ready')].status
          name: READY
          type: string
        - jsonPath: .status.conditions[?(@.type=='Synced')].status
          name: SYNCED
          type: string
        - jsonPath: .metadata.annotations.crossplane\.io/external-name
          name: EXTERNAL-NAME
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            VaultCredential is a managed resource representing a credential stored in
            an Anthropic Vault (beta API). The credential payload itself (token, OAuth
            access token) is write-only and never returned by the API.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: VaultCredentialSpec defines the desired state of VaultCredential.
              properties:
                forProvider:
                  description: |-
                    ForProvider holds the configuration the provider reconciles against the
                    Anthropic API on every loop.
                  properties:
                    anthropicDeletionPolicy:
                      default: Archive
                      description: |-
                        AnthropicDeletionPolicy controls whether Crossplane calls Archive or
                        Delete on the Anthropic API when the resource is deleted in Kubernetes.
                      enum:
                        - Archive
                        - Delete
                      type: string
                    auth:
                      description: Auth describes the credential payload (mcp_oauth or static_bearer).
                      properties:
                        accessTokenSecretRef:
                          description: |-
                            AccessTokenSecretRef references a Secret in the MR's namespace
                            holding the OAuth access token at the given key (mcp_oauth variant).
                            Omit for the static_bearer variant.
                          properties:
                            key:
                              type: string
                            name:
                              description: Name of the secret.
                              type: string
                          required:
                            - key
                            - name
                          type: object
                        expiresAt:
                          description: |-
                            ExpiresAt is the RFC 3339 timestamp at which the access token expires
                            (mcp_oauth variant).
                          type: string
                        injectionLocation:
                          description: |-
                            InjectionLocation selects where in the outbound request the secret value
                            is substituted (environment_variable variant). Omit to let the API apply
                            its own default.
                          properties:
                            body:
                              description: Body substitutes the secret when the placeholder appears in the request body.
                              type: boolean
                            header:
                              description: |-
                                Header substitutes the secret when the placeholder appears in a request
                                header value.
                              type: boolean
                          type: object
                        mcpServerUrl:
                          description: |-
                            MCPServerURL is the URL of the MCP server this credential authenticates
                            against. Required for the mcp_oauth and static_bearer variants; omit for
                            environment_variable. Immutable after creation.
                          type: string
                        networking:
                          description: |-
                            Networking scopes the outbound hosts the secret value is substituted on
                            (environment_variable variant). Required for that variant.
                          properties:
                            allowedHosts:
                              description: |-
                                AllowedHosts lists the hostnames on which the secret is substituted when
                                type is "limited". Each entry is a bare hostname (api.example.com), an
                                IPv4 address (192.0.2.1), or a *.-prefixed wildcard (*.example.com).
                                URLs, ports, paths, and IPv6 addresses are not accepted. At most 16 entries.
                              items:
                                type: string
                              maxItems: 16
                              type: array
                            type:
                              description: |-
                                Required: Type is the networking scope: "unrestricted" (any host) or
                                "limited" (only the hosts in allowedHosts).
                              enum:
                                - unrestricted
                                - limited
                              type: string
                          type: object
                        refresh:
                          description: Refresh configures OAuth refresh-token support (mcp_oauth variant).
                          properties:
                            clientId:
                              description: 'Required: ClientID is the OAuth client ID.'
                              type: string
                            refreshTokenSecretRef:
                              description: |-
                                Required: RefreshTokenSecretRef references a Secret in the MR's
                                namespace holding the OAuth refresh token at the given key.
                              properties:
                                key:
                                  type: string
                                name:
                                  description: Name of the secret.
                                  type: string
                              required:
                                - key
                                - name
                              type: object
                            resource:
                              description: Resource is an optional OAuth resource indicator.
                              type: string
                            scope:
                              description: Scope is the OAuth scope for the refresh request.
                              type: string
                            tokenEndpoint:
                              description: 'Required: TokenEndpoint is the URL used to refresh the access token.'
                              type: string
                            tokenEndpointAuth:
                              description: TokenEndpointAuth selects the auth scheme used at the token endpoint.
                              properties:
                                clientSecretSecretRef:
                                  description: |-
                                    ClientSecretSecretRef references a Secret in the MR's namespace
                                    holding the OAuth client secret at the given key. Required for
                                    client_secret_basic and client_secret_post; omit for the none variant.
                                  properties:
                                    key:
                                      type: string
                                    name:
                                      description: Name of the secret.
                                      type: string
                                  required:
                                    - key
                                    - name
                                  type: object
                                type:
                                  description: 'Required: Type is the auth scheme: "none", "client_secret_basic" or "client_secret_post".'
                                  enum:
                                    - none
                                    - client_secret_basic
                                    - client_secret_post
                                  type: string
                              type: object
                          required:
                            - tokenEndpointAuth
                          type: object
                        secretName:
                          description: |-
                            SecretName is the name of the environment variable (environment_variable
                            variant). Immutable after creation.
                          type: string
                        secretValueSecretRef:
                          description: |-
                            SecretValueSecretRef references a Secret in the MR's namespace holding the
                            environment variable's value at the given key (environment_variable
                            variant). Write-only; never returned by the API.
                          properties:
                            key:
                              type: string
                            name:
                              description: Name of the secret.
                              type: string
                          required:
                            - key
                            - name
                          type: object
                        tokenSecretRef:
                          description: |-
                            TokenSecretRef references a Secret in the MR's namespace holding the
                            static bearer token at the given key (static_bearer variant). Omit
                            for the mcp_oauth variant.
                          properties:
                            key:
                              type: string
                            name:
                              description: Name of the secret.
                              type: string
                          required:
                            - key
                            - name
                          type: object
                        type:
                          description: 'Required: Type identifies the credential variant.'
                          enum:
                            - mcp_oauth
                            - static_bearer
                            - environment_variable
                          type: string
                      type: object
                    displayName:
                      description: |-
                        DisplayName is the human-readable name for the credential. Up to 255
                        characters.
                      maxLength: 255
                      type: string
                    metadata:
                      additionalProperties:
                        type: string
                      description: |-
                        Metadata is arbitrary key-value data attached to the credential.
                        Maximum 16 pairs; keys up to 64 chars, values up to 512 chars.
                        On update this is a patch: omitted keys are preserved.
                      type: object
                    vaultId:
                      description: |-
                        VaultID is the ID of the parent Vault that stores this credential.
                        Populate directly or via VaultIDRef / VaultIDSelector. Immutable after
                        creation.
                      type: string
                    vaultIdRef:
                      description: Reference to a Vault to populate vaultId.
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace of the referenced object
                          type: string
                        policy:
                          description: Policies for referencing.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                                - Required
                                - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                                - Always
                                - IfNotPresent
                              type: string
                          type: object
                      required:
                        - name
                      type: object
                    vaultIdSelector:
                      description: Selector for a Vault to populate vaultId.
                      properties:
                        matchControllerRef:
                          description: |-
                            MatchControllerRef ensures an object with the same controller reference
                            as the selecting object is selected.
                          type: boolean
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: MatchLabels ensures an object with matching labels is selected.
                          type: object
                        namespace:
                          description: Namespace for the selector
                          type: string
                        policy:
                          description: Policies for selection.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                                - Required
                                - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                                - Always
                                - IfNotPresent
                              type: string
                          type: object
                      type: object
                  required:
                    - auth
                  type: object
                managementPolicies:
                  default:
                    - '*'
                  description: |-
                    THIS IS A BETA FIELD. It is on by default but can be opted out
                    through a Crossplane feature flag.
                    ManagementPolicies specify the array of actions Crossplane is allowed to
                    take on the managed and external resources.
                    See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                    and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                  items:
                    description: |-
                      A ManagementAction represents an action that the Crossplane controllers
                      can take on an external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - '*'
                    type: string
                  type: array
                providerConfigRef:
                  default:
                    kind: ClusterProviderConfig
                    name: default
                  description: |-
                    ProviderConfigReference specifies how the provider that will be used to
                    create, observe, update, and delete this managed resource should be
                    configured.
                  properties:
                    kind:
                      description: Kind of the referenced object.
                      type: string
                    name:
                      description: Name of the referenced object.
                      type: string
                  required:
                    - kind
                    - name
                  type: object
                writeConnectionSecretToRef:
                  description: |-
                    WriteConnectionSecretToReference specifies the namespace and name of a
                    Secret to which any connection details for this managed resource should
                    be written. Connection details frequently include the endpoint, username,
                    and password required to connect to the managed resource.
                  properties:
                    name:
                      description: Name of the secret.
                      type: string
                  required:
                    - name
                  type: object
              required:
                - forProvider
              type: object
            status:
              description: VaultCredentialStatus defines the observed state of VaultCredential.
              properties:
                atProvider:
                  description: AtProvider holds the observed state as returned by the Anthropic API.
                  properties:
                    archivedAt:
                      description: ArchivedAt is set when the credential has been archived.
                      type: string
                    auth:
                      description: |-
                        Auth holds the observed non-sensitive auth fields (type, mcpServerUrl).
                        Token values are write-only and excluded.
                      properties:
                        injectionLocation:
                          description: |-
                            InjectionLocation is the observed injection location
                            (environment_variable variant).
                          properties:
                            body:
                              description: Body indicates the secret is substituted in the request body.
                              type: boolean
                            header:
                              description: Header indicates the secret is substituted in request header values.
                              type: boolean
                          type: object
                        mcpServerUrl:
                          description: |-
                            MCPServerURL is the MCP server endpoint this credential authenticates
                            against (mcp_oauth and static_bearer variants).
                          type: string
                        networking:
                          description: Networking is the observed networking scope (environment_variable variant).
                          properties:
                            allowedHosts:
                              description: AllowedHosts lists the hosts the secret is substituted on (limited scope).
                              items:
                                type: string
                              type: array
                            type:
                              description: 'Type is the networking scope: "unrestricted" or "limited".'
                              type: string
                          type: object
                        secretName:
                          description: |-
                            SecretName is the observed environment variable name
                            (environment_variable variant).
                          type: string
                        type:
                          description: |-
                            Type is the credential variant: "mcp_oauth", "static_bearer", or
                            "environment_variable".
                          type: string
                      type: object
                    createdAt:
                      description: CreatedAt is the RFC 3339 timestamp when the credential was created.
                      type: string
                    displayName:
                      description: DisplayName is the observed human-readable credential name.
                      type: string
                    id:
                      description: |-
                        ID is the Anthropic-assigned credential identifier. Also stored in the
                        external-name annotation, which the reconciler uses as the primary key.
                      type: string
                    metadata:
                      additionalProperties:
                        type: string
                      description: Metadata is the observed key-value metadata map.
                      type: object
                    updatedAt:
                      description: UpdatedAt is the RFC 3339 timestamp of the last modification.
                      type: string
                    vaultId:
                      description: VaultID is the parent vault ID returned by the API.
                      type: string
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          LastTransitionTime is the last time this condition transitioned from one
                          status to another.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          A Message containing details about this condition's last transition from
                          one status to another, if any.
                        type: string
                      observedGeneration:
                        description: |-
                          ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        type: integer
                      reason:
                        description: A Reason for this condition's last transition from one status to another.
                        type: string
                      status:
                        description: Status of this condition; is it currently True, False, or Unknown?
                        type: string
                      type:
                        description: |-
                          Type of this condition. At most one of each condition type may apply to
                          a resource at any point in time.
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: |-
                    ObservedGeneration is the latest metadata.generation
                    which resulted in either a ready state, or stalled due to error
                    it can not recover from without human intervention.
                  format: int64
                  type: integer
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
