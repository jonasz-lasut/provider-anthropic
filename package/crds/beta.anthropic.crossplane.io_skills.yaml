---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    anthropic.crossplane.io/sdk-version: v1.55.0
  name: skills.beta.anthropic.crossplane.io
spec:
  group: beta.anthropic.crossplane.io
  names:
    categories:
      - crossplane
      - managed
      - anthropic
    kind: Skill
    listKind: SkillList
    plural: skills
    shortNames:
      - skill
    singular: skill
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type=='Ready')].status
          name: READY
          type: string
        - jsonPath: .status.conditions[?(@.type=='Synced')].status
          name: SYNCED
          type: string
        - jsonPath: .metadata.annotations.crossplane\.io/external-name
          name: EXTERNAL-NAME
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            Skill is a managed resource representing an Anthropic Skill (beta API).
            It manages both the BetaSkill container and its BetaSkillVersion content.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: SkillSpec defines the desired state of Skill.
              properties:
                forProvider:
                  description: |-
                    ForProvider holds the configuration the provider reconciles against the
                    Anthropic API on every loop.
                  properties:
                    displayTitle:
                      description: |-
                        DisplayTitle is the human-readable label for the skill.
                        Immutable after creation — the Anthropic API provides no endpoint to
                        update BetaSkill. Changes require delete and recreate.
                      type: string
                    filesSecretRef:
                      description: |-
                        Required: FilesSecretRef references a Secret in the MR's namespace where
                        each key is a flat filename (e.g. "SKILL.md", "helpers.py") and each
                        value is the file content in bytes. The Secret must contain a "SKILL.md"
                        key at minimum. The reconciler automatically places all files under a
                        top-level directory named after the Skill resource (e.g. the Skill named
                        "my-skill" uploads files as "my-skill/SKILL.md"). Content changes trigger
                        a new SkillVersion.
                      properties:
                        name:
                          description: Name of the secret.
                          type: string
                      required:
                        - name
                      type: object
                  required:
                    - filesSecretRef
                  type: object
                managementPolicies:
                  default:
                    - '*'
                  description: |-
                    THIS IS A BETA FIELD. It is on by default but can be opted out
                    through a Crossplane feature flag.
                    ManagementPolicies specify the array of actions Crossplane is allowed to
                    take on the managed and external resources.
                    See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                    and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                  items:
                    description: |-
                      A ManagementAction represents an action that the Crossplane controllers
                      can take on an external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - '*'
                    type: string
                  type: array
                providerConfigRef:
                  default:
                    kind: ClusterProviderConfig
                    name: default
                  description: |-
                    ProviderConfigReference specifies how the provider that will be used to
                    create, observe, update, and delete this managed resource should be
                    configured.
                  properties:
                    kind:
                      description: Kind of the referenced object.
                      type: string
                    name:
                      description: Name of the referenced object.
                      type: string
                  required:
                    - kind
                    - name
                  type: object
                writeConnectionSecretToRef:
                  description: |-
                    WriteConnectionSecretToReference specifies the namespace and name of a
                    Secret to which any connection details for this managed resource should
                    be written. Connection details frequently include the endpoint, username,
                    and password required to connect to the managed resource.
                  properties:
                    name:
                      description: Name of the secret.
                      type: string
                  required:
                    - name
                  type: object
              required:
                - forProvider
              type: object
            status:
              description: SkillStatus defines the observed state of Skill.
              properties:
                atProvider:
                  description: AtProvider holds the observed state as returned by the Anthropic API.
                  properties:
                    createdAt:
                      description: CreatedAt is the ISO 8601 timestamp when the skill was created.
                      type: string
                    displayTitle:
                      description: DisplayTitle is the observed human-readable label.
                      type: string
                    filesSha256:
                      description: |-
                        FilesSha256 is the full 64-char hex SHA-256 of the canonical encoding of
                        Secret.Data at the time of the last successful upload. Used for drift
                        detection; raw file content is never stored here.
                      type: string
                    id:
                      description: |-
                        ID is the Anthropic-assigned skill identifier (skl_...). Also stored in
                        the external-name annotation, which the reconciler uses as the primary key.
                      type: string
                    latestVersion:
                      description: |-
                        LatestVersion is the version string of the most recent SkillVersion
                        (a Unix epoch timestamp, e.g. "1759178010641129").
                      type: string
                    latestVersionCreatedAt:
                      description: |-
                        LatestVersionCreatedAt is the ISO 8601 timestamp when the latest version
                        was created.
                      type: string
                    latestVersionDescription:
                      description: LatestVersionDescription is extracted from SKILL.md by the Anthropic API.
                      type: string
                    latestVersionDirectory:
                      description: |-
                        LatestVersionDirectory is the top-level directory name extracted from the
                        uploaded file paths (e.g. "myskill").
                      type: string
                    latestVersionId:
                      description: LatestVersionID is the Anthropic-assigned ID of the latest SkillVersion.
                      type: string
                    latestVersionName:
                      description: LatestVersionName is extracted from SKILL.md by the Anthropic API.
                      type: string
                    source:
                      description: Source is either "custom" (user-created) or "anthropic".
                      type: string
                    updatedAt:
                      description: UpdatedAt is the ISO 8601 timestamp of the last modification.
                      type: string
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          LastTransitionTime is the last time this condition transitioned from one
                          status to another.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          A Message containing details about this condition's last transition from
                          one status to another, if any.
                        type: string
                      observedGeneration:
                        description: |-
                          ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        type: integer
                      reason:
                        description: A Reason for this condition's last transition from one status to another.
                        type: string
                      status:
                        description: Status of this condition; is it currently True, False, or Unknown?
                        type: string
                      type:
                        description: |-
                          Type of this condition. At most one of each condition type may apply to
                          a resource at any point in time.
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: |-
                    ObservedGeneration is the latest metadata.generation
                    which resulted in either a ready state, or stalled due to error
                    it can not recover from without human intervention.
                  format: int64
                  type: integer
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
