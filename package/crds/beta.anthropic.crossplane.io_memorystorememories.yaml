  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
    anthropic.crossplane.io/sdk-version: v1.44.1
  name: memorystorememories.beta.anthropic.crossplane.io
spec:
  group: beta.anthropic.crossplane.io
  names:
    categories:
      - crossplane
      - managed
      - anthropic
    kind: MemoryStoreMemory
    listKind: MemoryStoreMemoryList
    plural: memorystorememories
    shortNames:
      - memmem
    singular: memorystorememory
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type=='Ready')].status
          name: READY
          type: string
        - jsonPath: .status.conditions[?(@.type=='Synced')].status
          name: SYNCED
          type: string
        - jsonPath: .metadata.annotations.crossplane\.io/external-name
          name: EXTERNAL-NAME
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            MemoryStoreMemory is a managed resource representing a single text memory
            stored at a hierarchical path inside an Anthropic MemoryStore (beta API).
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: MemoryStoreMemorySpec defines the desired state of MemoryStoreMemory.
              properties:
                forProvider:
                  description: |-
                    ForProvider holds the configuration the provider reconciles against the
                    Anthropic API on every loop.
                  properties:
                    contentSecretRef:
                      description: |-
                        Required: ContentSecretRef references a Secret in the MR's namespace
                        holding the UTF-8 text content of the memory at the given key. Maximum
                        100 kB (102,400 bytes); the API rejects larger payloads.
                      properties:
                        key:
                          type: string
                        name:
                          description: Name of the secret.
                          type: string
                      required:
                        - key
                        - name
                      type: object
                    memoryStoreId:
                      description: |-
                        MemoryStoreID is the ID of the parent MemoryStore that holds this
                        memory. Populate directly or via MemoryStoreIDRef / MemoryStoreIDSelector.
                        Immutable after creation.
                      type: string
                    memoryStoreIdRef:
                      description: Reference to a MemoryStore to populate memoryStoreId.
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace of the referenced object
                          type: string
                        policy:
                          description: Policies for referencing.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                                - Required
                                - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                                - Always
                                - IfNotPresent
                              type: string
                          type: object
                      required:
                        - name
                      type: object
                    memoryStoreIdSelector:
                      description: Selector for a MemoryStore to populate memoryStoreId.
                      properties:
                        matchControllerRef:
                          description: |-
                            MatchControllerRef ensures an object with the same controller reference
                            as the selecting object is selected.
                          type: boolean
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: MatchLabels ensures an object with matching labels is selected.
                          type: object
                        namespace:
                          description: Namespace for the selector
                          type: string
                        policy:
                          description: Policies for selection.
                          properties:
                            resolution:
                              default: Required
                              description: |-
                                Resolution specifies whether resolution of this reference is required.
                                The default is 'Required', which means the reconcile will fail if the
                                reference cannot be resolved. 'Optional' means this reference will be
                                a no-op if it cannot be resolved.
                              enum:
                                - Required
                                - Optional
                              type: string
                            resolve:
                              description: |-
                                Resolve specifies when this reference should be resolved. The default
                                is 'IfNotPresent', which will attempt to resolve the reference only when
                                the corresponding field is not present. Use 'Always' to resolve the
                                reference on every reconcile.
                              enum:
                                - Always
                                - IfNotPresent
                              type: string
                          type: object
                      type: object
                    path:
                      description: |-
                        Required: Path is the hierarchical path of the memory within the store, e.g.
                        "/projects/foo/notes.md". Must start with "/", be at most 1,024 bytes,
                        and contain no empty/"."/".." segments. Renaming is supported via update.
                      maxLength: 1024
                      pattern: ^/.+
                      type: string
                  type: object
                managementPolicies:
                  default:
                    - '*'
                  description: |-
                    THIS IS A BETA FIELD. It is on by default but can be opted out
                    through a Crossplane feature flag.
                    ManagementPolicies specify the array of actions Crossplane is allowed to
                    take on the managed and external resources.
                    See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                    and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                  items:
                    description: |-
                      A ManagementAction represents an action that the Crossplane controllers
                      can take on an external resource.
                    enum:
                      - Observe
                      - Create
                      - Update
                      - Delete
                      - LateInitialize
                      - '*'
                    type: string
                  type: array
                providerConfigRef:
                  default:
                    kind: ClusterProviderConfig
                    name: default
                  description: |-
                    ProviderConfigReference specifies how the provider that will be used to
                    create, observe, update, and delete this managed resource should be
                    configured.
                  properties:
                    kind:
                      description: Kind of the referenced object.
                      type: string
                    name:
                      description: Name of the referenced object.
                      type: string
                  required:
                    - kind
                    - name
                  type: object
                writeConnectionSecretToRef:
                  description: |-
                    WriteConnectionSecretToReference specifies the namespace and name of a
                    Secret to which any connection details for this managed resource should
                    be written. Connection details frequently include the endpoint, username,
                    and password required to connect to the managed resource.
                  properties:
                    name:
                      description: Name of the secret.
                      type: string
                  required:
                    - name
                  type: object
              required:
                - forProvider
              type: object
            status:
              description: MemoryStoreMemoryStatus defines the observed state of MemoryStoreMemory.
              properties:
                atProvider:
                  description: AtProvider holds the observed state as returned by the Anthropic API.
                  properties:
                    contentSha256:
                      description: ContentSha256 is the lowercase hex SHA-256 digest of the stored content.
                      type: string
                    contentSizeBytes:
                      description: ContentSizeBytes is the size of the stored content in bytes.
                      format: int64
                      type: integer
                    createdAt:
                      description: CreatedAt is the RFC 3339 timestamp when the memory was created.
                      type: string
                    id:
                      description: |-
                        ID is the Anthropic-assigned memory identifier (a mem_... tagged ID).
                        Also stored in the external-name annotation, which the reconciler uses
                        as the primary key.
                      type: string
                    memoryStoreId:
                      description: MemoryStoreID is the parent memory store ID returned by the API.
                      type: string
                    memoryVersionId:
                      description: |-
                        MemoryVersionID is the ID of the memory_version representing this
                        memory's current content (a memver_... tagged ID).
                      type: string
                    path:
                      description: Path is the observed hierarchical path within the store.
                      type: string
                    updatedAt:
                      description: UpdatedAt is the RFC 3339 timestamp of the last modification.
                      type: string
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          LastTransitionTime is the last time this condition transitioned from one
                          status to another.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          A Message containing details about this condition's last transition from
                          one status to another, if any.
                        type: string
                      observedGeneration:
                        description: |-
                          ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        type: integer
                      reason:
                        description: A Reason for this condition's last transition from one status to another.
                        type: string
                      status:
                        description: Status of this condition; is it currently True, False, or Unknown?
                        type: string
                      type:
                        description: |-
                          Type of this condition. At most one of each condition type may apply to
                          a resource at any point in time.
                        type: string
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  description: |-
                    ObservedGeneration is the latest metadata.generation
                    which resulted in either a ready state, or stalled due to error
                    it can not recover from without human intervention.
                  format: int64
                  type: integer
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
