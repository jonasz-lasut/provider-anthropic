                    configured.
                  properties:
                    kind:
                      description: Kind of the referenced object.
                      type: string
                    name:
                      description: Name of the referenced object.
                      type: string
                  required:
                    - kind
                    - name
                  type: object
                writeConnectionSecretToRef:
