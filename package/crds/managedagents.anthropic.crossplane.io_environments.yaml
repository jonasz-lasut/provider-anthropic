---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    anthropic.crossplane.io/sdk-version: v1.57.0
  name: environments.managedagents.anthropic.crossplane.io
spec:
  group: managedagents.anthropic.crossplane.io
  names:
    categories:
      - crossplane
      - managed
      - anthropic
    kind: Environment
    listKind: EnvironmentList
    plural: environments
    shortNames:
      - env
    singular: environment
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.conditions[?(@.type=='Ready')].status
          name: READY
          type: string
        - jsonPath: .status.conditions[?(@.type=='Synced')].status
          name: SYNCED
          type: string
        - jsonPath: .metadata.annotations.crossplane\.io/external-name
          name: EXTERNAL-NAME
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
      name: v1beta1
      schema:
        openAPIV3Schema:
          description: |-
            Environment is a managed resource representing an Anthropic cloud environment
