                    metadata:
                      additionalProperties:
                        type: string
                      description: Metadata is the observed key-value metadata map.
                      type: object
                    name:
                      description: Name is the observed human-readable environment name.
                      type: string
                    scope:
                      description: Scope is the observed visibility scope of the environment.
                      type: string
                    updatedAt:
                      description: UpdatedAt is the RFC 3339 timestamp of the last modification.
                      type: string
                  type: object
                conditions:
                  description: Conditions of the resource.
                  items:
                    description: A Condition that may apply to a resource.
                    properties:
                      lastTransitionTime:
