                            cargo:
                              description: Cargo lists Rust packages to install.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: set
                            gem:
                              description: Gem lists Ruby packages to install.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: set
                            go:
                              description: Go lists Go packages to install.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: set
                            npm:
                              description: Npm lists Node.js packages to install.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: set
                            pip:
                              description: Pip lists Python packages to install.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: set
                          type: object
                      type: object
                    createdAt:
                      description: CreatedAt is the RFC 3339 timestamp when the environment was created.
                      type: string
                    description:
                      description: Description is the observed user-provided description.
                      type: string
                    id:
                      description: |-
                        ID is the Anthropic-assigned environment identifier. Also stored in the
