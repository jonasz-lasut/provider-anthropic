name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        required: true
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.26.5'
        required: false

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  publish-provider-package:
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider-non-family.yml@451c4dc6ad3691b0a702a997a0ac24e8bbc8bbaa # main
    with:
      repository: provider-anthropic
      version: ${{ github.event.inputs.version }}
      go-version: ${{ github.event.inputs.go-version }}
      mirror: true
      cleanup-disk: true
      registry_org: jonasz-lasut
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_TOKEN }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_ACCESS_ID }}

  attach-extensions:
    needs: publish-provider-package
    runs-on: ubuntu-latest
    env:
      UP_VERSION: v0.51.1
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Up Login
        env:
          UP_TOKEN: ${{ secrets.XPKG_TOKEN }}
        run: |
          curl -fsSLo /tmp/up --create-dirs 'https://cli.upbound.io/${{ env.UP_VERSION }}/bin/linux_amd64/up' && \
          chmod +x /tmp/up && \
          /tmp/up login

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BODY=$(gh release view ${{ inputs.version }} --repo jonasz-lasut/provider-anthropic --json body -q .body 2>/dev/null || true)
          if [ -n "$RELEASE_BODY" ]; then
            echo "$RELEASE_BODY" >> "release_notes.md"
          fi

      - name: Append package assets for Marketplace
        run: |
          extensions_dir=${{ github.workspace }}/extensions

          mkdir -p $extensions_dir/readme
          cp ./README.md $extensions_dir/readme/readme.md
          
          mkdir -p $extensions_dir/release-notes
          if [ -f ./release_notes.md ]; then
            cp ./release_notes.md $extensions_dir/release-notes/
          fi

          /tmp/up alpha xpkg append xpkg.upbound.io/jonasz-lasut/provider-anthropic:${{ inputs.version }} --extensions-root $extensions_dir

  sign-artifacts:
    needs: attach-extensions
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE: ghcr.io/jonasz-lasut/provider-anthropic
      MIRROR_IMAGE: xpkg.upbound.io/jonasz-lasut/provider-anthropic
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        id: syft-install

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign GHCR Image
        run: cosign sign --yes ${{ env.GHCR_IMAGE }}:${{ github.event.inputs.version }}

      - name: Generate GHCR SBOM
        run: ${{ steps.syft-install.outputs.cmd }} ${{ env.GHCR_IMAGE }}:${{ github.event.inputs.version }} -o spdx-json=ghcr-sbom.spdx.json

      - name: Attest SBOM to GHCR Image
        run: cosign attest --yes --predicate ghcr-sbom.spdx.json --type spdxjson ${{ env.GHCR_IMAGE }}:${{ github.event.inputs.version }}

      - name: Resolve GHCR Image Digest
        id: ghcr-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:${{ github.event.inputs.version }} | awk '/^Digest:/{print $2}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA Provenance to GHCR Image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.ghcr-digest.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Login to Upbound Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_ACCESS_ID }}
          password: ${{ secrets.XPKG_TOKEN }}

      - name: Sign Upbound Mirror Image
        run: cosign sign --yes ${{ env.MIRROR_IMAGE }}:${{ github.event.inputs.version }}

      - name: Generate Upbound Mirror SBOM
        run: ${{ steps.syft-install.outputs.cmd }} ${{ env.MIRROR_IMAGE }}:${{ github.event.inputs.version }} -o spdx-json=mirror-sbom.spdx.json

      - name: Attest SBOM to Upbound Mirror Image
        run: cosign attest --yes --predicate mirror-sbom.spdx.json --type spdxjson ${{ env.MIRROR_IMAGE }}:${{ github.event.inputs.version }}

      - name: Resolve Upbound Mirror Image Digest
        id: mirror-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.MIRROR_IMAGE }}:${{ github.event.inputs.version }} | awk '/^Digest:/{print $2}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA Provenance to Upbound Mirror Image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.MIRROR_IMAGE }}
          subject-digest: ${{ steps.mirror-digest.outputs.digest }}
          push-to-registry: true
          create-storage-record: false