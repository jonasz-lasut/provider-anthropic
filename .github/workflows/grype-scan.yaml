name: Grype Vulnerability Scan

on:
  schedule:
    # Monday 05:00 UTC (6:00 AM CET / 7:00 AM CEST). GitHub Actions cron is
    # always UTC, so this drifts an hour during CEST.
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Get Latest Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          SHA=$(gh api repos/${{ github.repository }}/commits/"${TAG}" --jq .sha)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Install Grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype-install

      - name: Scan Latest Release Image
        run: |
          ${{ steps.grype-install.outputs.cmd }} ghcr.io/jonasz-lasut/provider-anthropic:${{ steps.release.outputs.tag }} \
            -o table \
            -o sarif=grype-results.sarif

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: grype-results.sarif
          ref: refs/tags/${{ steps.release.outputs.tag }}
          sha: ${{ steps.release.outputs.sha }}
